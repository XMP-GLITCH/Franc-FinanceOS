
<style>
  @keyframes pulse-coin {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes blink-pixel {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes scan-line {
    0% { transform: translateY(-80px); opacity: 0.6; }
    100% { transform: translateY(80px); opacity: 0; }
  }
  @keyframes fade-in-word {
    0% { opacity: 0; letter-spacing: 16px; }
    100% { opacity: 1; letter-spacing: 10px; }
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  .loader-wrap {
    background: #080810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    min-height: 320px;
    border-radius: 16px;
  }

  .icon-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 32px;
    animation: pulse-coin 2.4s ease-in-out infinite;
  }

  .icon-wrap svg {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 26px;
  }

  .scan {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 18px;
    background: linear-gradient(to bottom, transparent, #c8f54222, transparent);
    border-radius: 26px;
    animation: scan-line 1.8s ease-in-out infinite;
    pointer-events: none;
  }

  .p0 { animation: blink-pixel 1.1s step-start infinite 0.0s; }
  .p1 { animation: blink-pixel 1.1s step-start infinite 0.15s; }
  .p2 { animation: blink-pixel 1.1s step-start infinite 0.3s; }
  .p3 { animation: blink-pixel 1.1s step-start infinite 0.45s; }
  .p4 { animation: blink-pixel 1.1s step-start infinite 0.6s; }
  .p5 { animation: blink-pixel 1.1s step-start infinite 0.75s; }
  .p6 { animation: blink-pixel 1.1s step-start infinite 0.9s; }
  .p7 { animation: blink-pixel 1.1s step-start infinite 1.05s; }
  .p8 { animation: blink-pixel 1.1s step-start infinite 1.2s; }
  .p9 { animation: blink-pixel 1.1s step-start infinite 1.35s; }

  .wordmark {
    font-family: ui-monospace, monospace;
    font-size: 22px;
    font-weight: 700;
    color: #c8f542;
    letter-spacing: 10px;
    animation: fade-in-word 0.9s ease-out both;
    margin-bottom: 10px;
  }

  .sub {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: #5a5a7a;
    letter-spacing: 3px;
    margin-bottom: 28px;
  }

  .loading-bar-wrap {
    width: 120px;
    height: 2px;
    background: #1a1a2e;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  @keyframes bar-fill {
    0%   { width: 0%; }
    20%  { width: 30%; }
    50%  { width: 58%; }
    80%  { width: 82%; }
    95%  { width: 95%; }
    100% { width: 100%; }
  }

  .loading-bar {
    height: 100%;
    background: #c8f542;
    border-radius: 2px;
    animation: bar-fill 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  .loading-text {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: #444466;
    letter-spacing: 1.5px;
  }

  .loading-text::after {
    content: '';
    animation: dots 1.2s steps(1) infinite;
  }
</style>

<div class="loader-wrap">
  <div class="icon-wrap">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="120" height="120" rx="26" fill="#c8f542"/>
      <circle cx="60" cy="60" r="42" fill="#080810"/>
      <!-- pixel F: block=6px gap=2px step=8px
           4 cols: 4*6+3*2=30 → startX=60-15=45
           6 rows: 6*6+5*2=46 → startY=60-23=37 -->
      <rect class="p0" x="45" y="37" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p1" x="53" y="37" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p2" x="61" y="37" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p3" x="69" y="37" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p4" x="45" y="45" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p5" x="45" y="53" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p6" x="53" y="53" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p7" x="61" y="53" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p8" x="45" y="61" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p8" x="45" y="69" width="6" height="6" rx="1" fill="#c8f542"/>
      <rect class="p9" x="45" y="77" width="6" height="6" rx="1" fill="#c8f542"/>
    </svg>
    <div class="scan"></div>
  </div>

  <div class="wordmark">FRANC</div>
  <div class="sub">PERSONAL FINANCE OS</div>

  <div class="loading-bar-wrap">
    <div class="loading-bar"></div>
  </div>
  <div class="loading-text">loading</div>
</div>
